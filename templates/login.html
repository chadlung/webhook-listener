<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Login – Webhook Listener</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  .login-wrap { max-width: 360px; margin: 6rem auto; }
  .login-wrap h2 { margin-bottom: 1.2rem; }
  .field { margin-bottom: 0.8rem; }
  .field label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; }
  .error-msg { color: #991b1b; font-size: 0.9rem; margin-bottom: 0.8rem; }
  .btn-primary { width: 100%; padding: 0.5rem; background: #1d4ed8; color: #fff; border: none; border-radius: 4px; font: inherit; cursor: pointer; font-size: 1rem; }
  .btn-primary:hover { background: #1e40af; }
</style>
</head>
<body>
<div class="login-wrap">
  <h2>Webhook Listener</h2>
  {% if error %}<p class="error-msg">Invalid username or password.</p>{% endif %}
  <form method="post" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="btn-primary" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
