<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Webhook Listener</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; }
  .login-box {
    background: #fff;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .login-logo {
    font-size: 1.3rem;
    font-weight: 800;
    color: #0f172a;
    text-align: center;
    margin-bottom: .25rem;
    letter-spacing: .02em;
  }
  .login-sub {
    text-align: center;
    font-size: .82rem;
    color: #94a3b8;
    margin-bottom: 2rem;
  }
  .login-box .form-row { margin-bottom: .9rem; }
  .login-box .form-row label { font-size: .82rem; font-weight: 600; color: #475569; display: block; margin-bottom: .3rem; }
  .login-box input { width: 100%; padding: .55rem .75rem; border: 1px solid #cbd5e1; border-radius: 7px; font: inherit; font-size: .92rem; transition: border-color .15s, box-shadow .15s; }
  .login-box input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
  .login-btn { width: 100%; margin-top: 1.25rem; padding: .6rem; background: #3b82f6; color: #fff; border: none; border-radius: 7px; font: inherit; font-size: .95rem; font-weight: 600; cursor: pointer; transition: background .15s; }
  .login-btn:hover { background: #2563eb; }
  .error-msg {
    background: #fff1f2;
    border: 1px solid #fda4af;
    color: #be123c;
    border-radius: 7px;
    padding: .55rem .85rem;
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 1rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">⬡ Webhook Listener</div>
  <div class="login-sub">Sign in to your dashboard</div>
  {% if error %}
  <div class="error-msg">Invalid username or password.</div>
  {% endif %}
  <form method="post" action="/login">
    <div class="form-row">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>
    </div>
    <button class="login-btn" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
